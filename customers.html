<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers | AutoServe Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body class="light">
    <main class="main-content">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Customer Management</h1>
                <p class="text-gray-500 dark:text-gray-400">View and manage your customer database.</p>
            </div>
            <button id="btn-add-customer" class="bg-accent hover:bg-accent-hover text-white px-5 py-2.5 rounded-lg text-sm font-semibold flex items-center gap-2 shadow-md shadow-accent/20 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                Register Customer
            </button>
        </div>

        <!-- Filter Bar -->
        <div class="card p-4 rounded-xl mb-6 shadow-sm border border-gray-100 dark:border-gray-800 flex flex-col md:flex-row gap-4 items-center">
            <div class="relative flex-1">
                <input id="search-customer" type="text" placeholder="Search by name, phone or registration..." class="w-full pl-10 pr-4 py-2 bg-gray-50 dark:bg-gray-800 border dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-primary">
                <svg class="absolute left-3 top-2.5 text-gray-400" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </div>
            <select id="filter-vehicle-type" class="bg-gray-50 dark:bg-gray-800 border dark:border-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary min-w-[150px]">
                <option value="all">All Vehicles</option>
                <option value="Car">Cars</option>
                <option value="Bike">Bikes</option>
            </select>
        </div>

        <!-- Table -->
        <div class="card rounded-xl shadow-sm overflow-hidden border border-gray-100 dark:border-gray-800">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 dark:bg-gray-800/50 text-xs uppercase text-gray-500 font-bold">
                        <tr>
                            <th class="px-6 py-4">Customer Info</th>
                            <th class="px-6 py-4">Vehicles</th>
                            <th class="px-6 py-4">Join Date</th>
                            <th class="px-6 py-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="customer-list" class="divide-y dark:divide-gray-800">
                        <!-- Injected -->
                    </tbody>
                </table>
                <div id="empty-state" class="p-12 text-center text-gray-500 hidden">
                    <p>No customers found matching your criteria.</p>
                </div>
            </div>
        </div>

        <!-- Modal Overlay -->
        <div id="customer-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
            <div class="bg-white dark:bg-gray-900 rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden">
                <div class="p-6 border-b dark:border-gray-800 flex items-center justify-between">
                    <h2 id="modal-title" class="text-xl font-bold">Add New Customer</h2>
                    <button id="close-modal" class="text-gray-400 hover:text-gray-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    </button>
                </div>
                <form id="customer-form" class="p-6">
                    <input type="hidden" id="edit-id">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="block text-sm font-medium mb-1">Full Name *</label>
                            <input type="text" id="cust-name" required class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Phone Number *</label>
                            <input type="tel" id="cust-phone" required class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Email Address</label>
                            <input type="email" id="cust-email" class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Address</label>
                            <input type="text" id="cust-address" class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800">
                        </div>
                    </div>

                    <div class="border-t dark:border-gray-800 pt-6">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-bold">Add Vehicle</h3>
                            <p class="text-xs text-gray-500">Every customer needs at least one vehicle.</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Type</label>
                                <select id="veh-type" class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800">
                                    <option value="Car">Car</option>
                                    <option value="Bike">Bike</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Brand</label>
                                <input type="text" id="veh-brand" class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800" placeholder="e.g. Toyota">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Model</label>
                                <input type="text" id="veh-model" class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800" placeholder="e.g. Corolla">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Reg. Number *</label>
                                <input type="text" id="veh-reg" required class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800 uppercase" placeholder="ABC-123">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Year</label>
                                <input type="number" id="veh-year" class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800" placeholder="2022">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Color</label>
                                <input type="text" id="veh-color" class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800" placeholder="White">
                            </div>
                        </div>
                    </div>

                    <div class="mt-8 flex justify-end gap-3">
                        <button type="button" id="cancel-form" class="px-6 py-2 border dark:border-gray-700 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">Cancel</button>
                        <button type="submit" class="bg-primary text-white px-8 py-2 rounded-lg font-medium">Save Customer</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const list = document.getElementById('customer-list');
            const emptyState = document.getElementById('empty-state');
            const modal = document.getElementById('customer-modal');
            const form = document.getElementById('customer-form');
            const searchInput = document.getElementById('search-customer');
            const typeFilter = document.getElementById('filter-vehicle-type');

            function renderCustomers() {
                const customers = App.db.getData('customers');
                const searchQuery = searchInput.value.toLowerCase();
                const filterType = typeFilter.value;

                const filtered = customers.filter(c => {
                    const name = (c.name || '').toLowerCase();
                    const phone = (c.phone || '');
                    const matchesSearch = name.includes(searchQuery) || 
                                        phone.includes(searchQuery) || 
                                        (c.vehicles && c.vehicles.some(v => (v.reg || '').toLowerCase().includes(searchQuery)));
                    
                    const matchesType = filterType === 'all' || (c.vehicles && c.vehicles.some(v => v.type === filterType));
                    
                    return matchesSearch && matchesType;
                });

                list.innerHTML = '';
                if (filtered.length === 0) {
                    emptyState.classList.remove('hidden');
                } else {
                    emptyState.classList.add('hidden');
                    filtered.forEach(c => {
                        const tr = document.createElement('tr');
                        tr.className = 'hover:bg-gray-50 dark:hover:bg-gray-800/30 transition-colors';
                        tr.innerHTML = `
                            <td class="px-6 py-4">
                                <p class="font-bold text-lg">${c.name}</p>
                                <p class="text-sm text-gray-500">${c.phone} | ${c.email || 'No email'}</p>
                            </td>
                            <td class="px-6 py-4">
                                ${(c.vehicles || []).map(v => `
                                    <div class="mb-2 last:mb-0">
                                        <div class="flex items-center gap-2 mb-0.5">
                                            <span class="text-[10px] bg-gray-100 dark:bg-gray-800 px-1.5 py-0.5 rounded font-bold uppercase">${v.type || 'N/A'}</span>
                                            <span class="text-sm font-bold text-gray-800 dark:text-gray-200">${v.brand || ''} ${v.model || ''}</span>
                                            <code class="text-[10px] bg-accent/10 text-accent px-1.5 rounded uppercase font-bold">${v.reg || 'NO REG'}</code>
                                        </div>
                                        <p class="text-[10px] text-gray-500 font-medium">Year: ${v.year || 'N/A'} | Color: ${v.color || 'N/A'}</p>
                                    </div>
                                `).join('')}
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-500">${new Date(c.createdAt).toLocaleDateString()}</td>
                            <td class="px-6 py-4 text-right">
                                <button onclick="editCustomer('${c.id}')" class="p-2 text-primary hover:bg-primary/10 rounded-lg transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
                                </button>
                                <button onclick="deleteCustomer('${c.id}')" class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                                </button>
                            </td>
                        `;
                        list.appendChild(tr);
                    });
                }
            }

            // Form Submit
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                if (!App.ui.validateForm('customer-form')) return;

                const id = document.getElementById('edit-id').value;
                const customers = App.db.getData('customers');
                const existingCustomer = id ? customers.find(c => c.id === id) : null;

                const vehicleData = {
                    type: document.getElementById('veh-type').value,
                    brand: document.getElementById('veh-brand').value,
                    model: document.getElementById('veh-model').value,
                    reg: document.getElementById('veh-reg').value,
                    year: document.getElementById('veh-year').value,
                    color: document.getElementById('veh-color').value,
                };

                const customerData = {
                    name: document.getElementById('cust-name').value,
                    phone: document.getElementById('cust-phone').value,
                    email: document.getElementById('cust-email').value,
                    address: document.getElementById('cust-address').value,
                    // If editing, preserve other vehicles. For simplicity, we only edit the first one here.
                    vehicles: existingCustomer ? 
                        [vehicleData, ...existingCustomer.vehicles.filter(v => v.reg !== vehicleData.reg && v.reg !== document.getElementById('veh-reg').defaultValue)] 
                        : [vehicleData]
                };
                
                // Note: The logic above is slightly complex for an MVP. 
                // Let's simplify: if editing, we update the first vehicle. 
                // If the user wants to add more, they use the new Vehicles page.

                if (id) {
                    // Merging logic:
                    const updatedVehicles = [...existingCustomer.vehicles];
                    updatedVehicles[0] = vehicleData; // Update the primary vehicle managed in this form

                    App.db.update('customers', id, {
                        ...customerData,
                        vehicles: updatedVehicles
                    });
                    App.ui.showToast('Customer updated successfully', 'success');
                } else {
                    App.db.create('customers', customerData);
                    App.ui.showToast('Customer registered successfully', 'success');
                }

                modal.classList.add('hidden');
                form.reset();
                renderCustomers();
            });

            // Handlers
            window.editCustomer = (id) => {
                const customers = App.db.getData('customers');
                const c = customers.find(x => x.id === id);
                if (c) {
                    document.getElementById('modal-title').innerText = 'Edit Customer';
                    document.getElementById('edit-id').value = c.id;
                    document.getElementById('cust-name').value = c.name;
                    document.getElementById('cust-phone').value = c.phone;
                    document.getElementById('cust-email').value = c.email;
                    document.getElementById('cust-address').value = c.address;
                    
                    const v = c.vehicles && c.vehicles.length > 0 ? c.vehicles[0] : {}; // Simplification for MVP
                    document.getElementById('veh-type').value = v.type || 'Car';
                    document.getElementById('veh-brand').value = v.brand || '';
                    document.getElementById('veh-model').value = v.model || '';
                    document.getElementById('veh-reg').value = v.reg || '';
                    document.getElementById('veh-year').value = v.year || '';
                    document.getElementById('veh-color').value = v.color || '';
                    
                    modal.classList.remove('hidden');
                }
            };

            window.deleteCustomer = (id) => {
                App.ui.confirmAction('Are you sure you want to delete this customer? All vehicle records will be lost.', () => {
                    App.db.delete('customers', id);
                    App.ui.showToast('Customer deleted');
                    renderCustomers();
                });
            };

            // UI Listeners
            document.getElementById('btn-add-customer').addEventListener('click', () => {
                document.getElementById('modal-title').innerText = 'Register Customer';
                document.getElementById('edit-id').value = '';
                form.reset();
                modal.classList.remove('hidden');
            });
            document.getElementById('close-modal').addEventListener('click', () => modal.classList.add('hidden'));
            document.getElementById('cancel-form').addEventListener('click', () => modal.classList.add('hidden'));
            searchInput.addEventListener('input', renderCustomers);
            typeFilter.addEventListener('change', renderCustomers);

            renderCustomers();
        });
    </script>
</body>
</html>
