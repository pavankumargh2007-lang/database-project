<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory | AutoServe Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body class="light">
    <main class="main-content">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Spare Parts Inventory</h1>
                <p class="text-gray-500 dark:text-gray-400">Monitor stock levels, reorder parts, and manage automotive components.</p>
            </div>
            <button id="btn-add-item" class="bg-accent hover:bg-accent-hover text-white px-5 py-2.5 rounded-lg text-sm font-semibold flex items-center gap-2 shadow-md shadow-accent/20 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                Add Inventory Item
            </button>
        </div>

        <!-- Inventory Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
             <div class="card p-6 rounded-xl bg-orange-50 dark:bg-orange-950/20 border-orange-100 dark:border-orange-900/30">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-white dark:bg-gray-800 rounded-lg text-orange-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
                    </div>
                    <div>
                        <h4 class="text-sm font-medium text-gray-500">Low Stock Alerts</h4>
                        <p id="stat-low-stock" class="text-2xl font-bold text-orange-600">0 Items</p>
                    </div>
                </div>
             </div>
             <div class="card p-6 rounded-xl">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-blue-50 dark:bg-blue-900/30 rounded-lg text-blue-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.27 6.96 8.73 5.05 8.73-5.05"/><path d="M12 22.08V12"/></svg>
                    </div>
                    <div>
                        <h4 class="text-sm font-medium text-gray-500">Total Categories</h4>
                        <p id="stat-total-categories" class="text-2xl font-bold">0</p>
                    </div>
                </div>
             </div>
             <div class="card p-6 rounded-xl">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-green-50 dark:bg-green-900/30 rounded-lg text-green-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    </div>
                    <div>
                        <h4 class="text-sm font-medium text-gray-500">Inventory Value</h4>
                        <p id="stat-total-value" class="text-2xl font-bold">$0.00</p>
                    </div>
                </div>
             </div>
        </div>

        <!-- Inventory Table -->
        <div class="card rounded-xl shadow-sm border border-gray-100 dark:border-gray-800 overflow-hidden">
            <div class="p-4 border-b dark:border-gray-800 flex gap-4 bg-gray-50/30 dark:bg-gray-800/20">
                <input id="search-inventory" type="text" placeholder="Search part name or number..." class="flex-1 p-2 bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-lg">
                <select id="filter-category" class="bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-lg px-4 py-2">
                    <option value="all">All Categories</option>
                    <option value="Engine">Engine</option>
                    <option value="Electrical">Electrical</option>
                    <option value="Body">Body</option>
                    <option value="Tyres">Tyres</option>
                    <option value="Filters">Filters</option>
                    <option value="Lubricants">Lubricants</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 dark:bg-gray-800/80 text-xs uppercase text-gray-500 font-bold">
                        <tr>
                            <th class="px-6 py-4">Part Details</th>
                            <th class="px-6 py-4">Category</th>
                            <th class="px-6 py-4 text-center">In Stock</th>
                            <th class="px-6 py-4">Unit Price</th>
                            <th class="px-6 py-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-list" class="divide-y dark:divide-gray-800">
                        <!-- rows -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Inventory Modal -->
        <div id="item-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
            <div class="bg-white dark:bg-gray-900 rounded-2xl w-full max-w-xl shadow-2xl overflow-hidden">
                <div class="p-6 border-b dark:border-gray-800 flex items-center justify-between">
                    <h2 id="modal-title" class="text-xl font-bold">New Inventory Item</h2>
                    <button class="close-modal text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
                </div>
                <form id="item-form" class="p-6 space-y-4">
                    <input type="hidden" id="edit-item-id">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2">
                            <label class="block text-sm font-medium mb-1">Part Name *</label>
                            <input id="item-name" type="text" required class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Part Number</label>
                            <input id="item-no" type="text" class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800 uppercase" placeholder="PT-000">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Category *</label>
                            <select id="item-category" required class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800">
                                <option value="Engine">Engine</option>
                                <option value="Electrical">Electrical</option>
                                <option value="Body">Body</option>
                                <option value="Tyres">Tyres</option>
                                <option value="Filters">Filters</option>
                                <option value="Lubricants">Lubricants</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Stock Quantity *</label>
                            <input id="item-qty" type="number" required class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Unit Price ($) *</label>
                            <input id="item-price" type="number" step="0.01" required class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Reorder Level *</label>
                            <input id="item-reorder" type="number" required class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800">
                        </div>
                         <div>
                            <label class="block text-sm font-medium mb-1">Brand</label>
                            <input id="item-brand" type="text" class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800">
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end gap-3">
                        <button type="button" class="close-modal px-6 py-2 border dark:border-gray-700 rounded-lg">Cancel</button>
                        <button type="submit" class="bg-primary text-white px-8 py-2 rounded-lg font-bold">Save Item</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const list = document.getElementById('inventory-list');
            const searchInput = document.getElementById('search-inventory');
            const categoryFilter = document.getElementById('filter-category');
            const modal = document.getElementById('item-modal');
            const form = document.getElementById('item-form');

            function renderInventory() {
                const inventory = App.db.getData('inventory');
                const searchQuery = searchInput.value.toLowerCase();
                const filterCat = categoryFilter.value;

                const filtered = inventory.filter(p => {
                    const matchesSearch = p.name.toLowerCase().includes(searchQuery) || p.partNo.toLowerCase().includes(searchQuery);
                    const matchesCat = filterCat === 'all' || p.category === filterCat;
                    return matchesSearch && matchesCat;
                });

                list.innerHTML = '';
                let lowStockCount = 0;
                let totalValue = 0;
                let categories = new Set();

                filtered.forEach(p => {
                    const isLow = p.qty <= p.reorderLevel;
                    if (isLow) lowStockCount++;
                    totalValue += (p.qty * p.price);
                    categories.add(p.category);

                    const tr = document.createElement('tr');
                    tr.className = `hover:bg-gray-50 dark:hover:bg-gray-800/30 ${isLow ? 'bg-red-50/50 dark:bg-red-950/10' : ''}`;
                    tr.innerHTML = `
                        <td class="px-6 py-4">
                            <p class="font-bold">${p.name}</p>
                            <p class="text-xs text-gray-400 font-mono">#${p.partNo}</p>
                        </td>
                        <td class="px-6 py-4 text-sm font-medium">${p.category}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="${isLow ? 'text-red-600 font-bold' : ''}">${p.qty}</span>
                            ${isLow ? `<span class="ml-2 bg-red-100 text-red-600 text-[10px] px-1.5 py-0.5 rounded font-bold uppercase tracking-tighter">Low</span>` : ''}
                        </td>
                        <td class="px-6 py-4 font-semibold">$${parseFloat(p.price).toFixed(2)}</td>
                        <td class="px-6 py-4 text-right">
                             <button onclick="editItem('${p.id}')" class="p-2 text-primary hover:bg-primary/10 rounded-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
                            </button>
                             <button onclick="deleteItem('${p.id}')" class="p-2 text-red-500 hover:bg-red-50 rounded-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                            </button>
                        </td>
                    `;
                    list.appendChild(tr);
                });

                document.getElementById('stat-low-stock').innerText = `${lowStockCount} Items`;
                document.getElementById('stat-total-categories').innerText = categories.size;
                document.getElementById('stat-total-value').innerText = `$${totalValue.toLocaleString()}`;
            }

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                if (!App.ui.validateForm('item-form')) return;

                const id = document.getElementById('edit-item-id').value;
                const data = {
                    name: document.getElementById('item-name').value,
                    partNo: document.getElementById('item-no').value,
                    category: document.getElementById('item-category').value,
                    qty: parseInt(document.getElementById('item-qty').value),
                    price: parseFloat(document.getElementById('item-price').value),
                    reorderLevel: parseInt(document.getElementById('item-reorder').value),
                    brand: document.getElementById('item-brand').value
                };

                if (id) {
                    App.db.update('inventory', id, data);
                    App.ui.showToast('Item updated');
                } else {
                    App.db.create('inventory', data);
                    App.ui.showToast('Item added to stock', 'success');
                }

                modal.classList.add('hidden');
                renderInventory();
            });

            window.editItem = (id) => {
                const item = App.db.getData('inventory').find(p => p.id === id);
                if (item) {
                    document.getElementById('modal-title').innerText = 'Edit Inventory Item';
                    document.getElementById('edit-item-id').value = item.id;
                    document.getElementById('item-name').value = item.name;
                    document.getElementById('item-no').value = item.partNo;
                    document.getElementById('item-category').value = item.category;
                    document.getElementById('item-qty').value = item.qty;
                    document.getElementById('item-price').value = item.price;
                    document.getElementById('item-reorder').value = item.reorderLevel;
                    document.getElementById('item-brand').value = item.brand;
                    modal.classList.remove('hidden');
                }
            };

            window.deleteItem = (id) => {
                App.ui.confirmAction('Delete this item from inventory?', () => {
                    App.db.delete('inventory', id);
                    App.ui.showToast('Item deleted');
                    renderInventory();
                });
            };

            document.getElementById('btn-add-item').addEventListener('click', () => {
                document.getElementById('modal-title').innerText = 'New Inventory Item';
                document.getElementById('edit-item-id').value = '';
                form.reset();
                modal.classList.remove('hidden');
            });
            document.querySelectorAll('.close-modal').forEach(b => {
                b.addEventListener('click', () => modal.classList.add('hidden'));
            });
            searchInput.addEventListener('input', renderInventory);
            categoryFilter.addEventListener('change', renderInventory);

            renderInventory();
        });
    </script>
</body>
</html>
