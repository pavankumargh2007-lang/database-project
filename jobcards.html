<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Cards | AutoServe Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body class="light">
    <main class="main-content">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Active Job Cards</h1>
                <p class="text-gray-500 dark:text-gray-400">Track current workshop operations and service progress.</p>
            </div>
            <div class="flex gap-3">
                 <button id="btn-service-history" class="bg-white border dark:border-gray-700 text-primary dark:text-blue-300 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors shadow-sm flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    Service History
                </button>
            </div>
        </div>

        <!-- Job Cards Grid -->
        <div id="job-cards-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <!-- Job cards injected here -->
        </div>

        <div id="no-jobcards" class="hidden p-20 text-center card rounded-xl">
            <svg class="mx-auto mb-4 text-gray-300" xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
            <p class="text-gray-500">No active job cards found. Create one from the <a href="bookings.html" class="text-primary font-bold hover:underline">Bookings</a> page.</p>
        </div>

        <!-- Service History Modal -->
        <div id="history-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
            <div class="bg-white dark:bg-gray-900 rounded-2xl w-full max-w-4xl max-h-[80vh] shadow-2xl overflow-hidden flex flex-col">
                <div class="p-6 border-b dark:border-gray-800 flex items-center justify-between">
                    <h2 class="text-xl font-bold">Vehicle Service History</h2>
                    <button class="close-modal text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
                </div>
                <div class="p-6 overflow-y-auto flex-1">
                    <div class="mb-6 flex gap-4">
                        <input id="search-history" type="text" placeholder="Enter Registration Number..." class="flex-1 p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800">
                        <button onclick="searchHistory()" class="bg-primary text-white px-6 rounded-lg">Search</button>
                    </div>
                    <div id="history-results" class="space-y-4">
                        <p class="text-center text-gray-400 py-10">Search by vehicle registration to see history.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Job Card Detail / Print Modal -->
        <div id="detail-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
             <div class="bg-white dark:bg-gray-900 rounded-2xl w-full max-w-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                <div class="p-6 border-b dark:border-gray-800 flex items-center justify-between no-print">
                    <h2 class="text-xl font-bold">Job Card Detail</h2>
                    <div class="flex gap-2">
                        <button onclick="window.print()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg></button>
                        <button class="close-detail text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
                    </div>
                </div>
                <div id="jobcard-print-area" class="p-8 overflow-y-auto">
                    <!-- Detail injected here -->
                </div>
             </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('job-cards-container');
            const noJobcards = document.getElementById('no-jobcards');

            function renderJobCards() {
                const jobcards = App.db.getData('jobcards').filter(j => j.status !== 'Invoiced');
                container.innerHTML = '';

                if (jobcards.length === 0) {
                    noJobcards.classList.remove('hidden');
                } else {
                    noJobcards.classList.add('hidden');
                    jobcards.forEach(j => {
                        const card = document.createElement('div');
                        card.className = 'card p-0 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-all border border-gray-100 dark:border-gray-800 flex flex-col';
                        card.innerHTML = `
                            <div class="p-5 border-b dark:border-gray-800 flex items-center justify-between bg-gray-50 dark:bg-gray-800/50">
                                <div>
                                    <span class="text-xs font-bold text-gray-500 uppercase">Card No</span>
                                    <h4 class="font-bold text-lg">#${j.jobNo}</h4>
                                </div>
                                <span class="px-3 py-1 rounded-full text-xs font-bold ${getStatusClass(j.status)}">${j.status}</span>
                            </div>
                            <div class="p-5 flex-1">
                                <div class="mb-4">
                                    <p class="text-sm font-bold">${j.customerName}</p>
                                    <p class="text-xs text-accent font-bold uppercase tracking-wide">${j.vehicleModel} - ${j.vehicleReg}</p>
                                    <p class="text-[10px] text-gray-500 mt-1 font-medium">Year: ${j.vehicleYear || 'N/A'} | Color: ${j.vehicleColor || 'N/A'}</p>
                                </div>
                                <div class="grid grid-cols-2 gap-4 text-sm mb-4">
                                    <div>
                                        <p class="text-gray-400 text-xs uppercase mb-1">Mechanic</p>
                                        <p class="font-semibold">${j.mechanic}</p>
                                    </div>
                                    <div>
                                        <p class="text-gray-400 text-xs uppercase mb-1">Service</p>
                                        <p class="font-semibold">${j.serviceType}</p>
                                    </div>
                                </div>
                                <div class="p-3 bg-gray-50 dark:bg-gray-800 rounded-lg text-sm italic text-gray-600 dark:text-gray-400">
                                    "${j.notes || 'No notes'}"
                                </div>
                            </div>
                            <div class="p-5 bg-gray-50/50 dark:bg-gray-800/20 border-t dark:border-gray-800 grid grid-cols-2 gap-3">
                                <button onclick="updateJobStatus('${j.id}')" class="bg-primary text-white py-2 rounded-lg text-xs font-bold">Update Status</button>
                                <button onclick="viewJobDetail('${j.id}')" class="bg-white dark:bg-gray-700 border dark:border-gray-600 py-2 rounded-lg text-xs font-bold">View Details</button>
                                ${j.status === 'Completed' ? `<button onclick="generateInvoice('${j.id}')" class="col-span-2 bg-green-600 text-white py-2 rounded-lg text-xs font-bold mt-1">Generate Invoice</button>` : ''}
                            </div>
                        `;
                        container.appendChild(card);
                    });
                }
            }

            function getStatusClass(status) {
                switch(status) {
                    case 'Open': return 'bg-gray-100 text-gray-600';
                    case 'In Progress': return 'bg-blue-100 text-blue-600';
                    case 'Quality Check': return 'bg-purple-100 text-purple-600';
                    case 'Completed': return 'bg-green-100 text-green-600';
                    default: return 'bg-gray-100';
                }
            }

            window.updateJobStatus = (id) => {
                const job = App.db.getData('jobcards').find(j => j.id === id);
                const nextStatus = {
                    'Open': 'In Progress',
                    'In Progress': 'Quality Check',
                    'Quality Check': 'Completed',
                    'Completed': 'Completed'
                };
                
                const newStatus = nextStatus[job.status];
                App.db.update('jobcards', id, { status: newStatus });
                App.ui.showToast(`Job Card moved to ${newStatus}`, 'success');
                
                if (newStatus === 'Completed') {
                     // Auto trigger notification
                    const c = App.db.getData('customers').find(x => x.name === job.customerName);
                    if (c) {
                        App.db.create('notifications', {
                            customerId: c.id,
                            customerName: c.name,
                            message: `Hi ${c.name}, the service for your vehicle ${job.vehicleReg} is COMPLETED. Ready for pickup!`,
                            type: 'SMS',
                            status: 'Sent'
                        });
                    }
                }
                renderJobCards();
            };

            window.viewJobDetail = (id) => {
                const job = App.db.getData('jobcards').find(j => j.id === id);
                const area = document.getElementById('jobcard-print-area');
                area.innerHTML = `
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <h1 class="text-3xl font-bold tracking-tighter text-primary">JOB CARD</h1>
                            <p class="text-sm text-gray-500 uppercase tracking-widest">AutoServe Pro Workshop</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-gray-400 font-bold uppercase tracking-wider">Number</p>
                            <p class="text-xl font-bold">#${job.jobNo}</p>
                            <p class="text-xs text-gray-500 mt-1">Date: ${new Date().toLocaleDateString()}</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-8 mb-10">
                        <div class="space-y-4">
                            <div>
                                <h4 class="text-xs text-gray-400 font-bold uppercase tracking-widest border-b pb-1 mb-2">Customer</h4>
                                <p class="font-bold text-lg">${job.customerName}</p>
                                <p class="text-sm text-gray-500 italic">Preferred Service Account</p>
                            </div>
                            <div>
                                <h4 class="text-xs text-gray-400 font-bold uppercase tracking-widest border-b pb-1 mb-2">Service Advisor</h4>
                                <p class="font-semibold">Workstation 04 - ${job.mechanic}</p>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div>
                                <h4 class="text-xs text-gray-400 font-bold uppercase tracking-widest border-b pb-1 mb-2">Vehicle Details</h4>
                                <p class="font-bold text-lg">${job.vehicleModel}</p>
                                <p class="font-mono text-accent text-lg font-bold">${job.vehicleReg}</p>
                                <p class="text-sm text-gray-500 mt-1">Year: ${job.vehicleYear || 'N/A'} | Color: ${job.vehicleColor || 'N/A'}</p>
                            </div>
                        </div>
                    </div>

                    <div class="mb-10">
                        <h4 class="text-xs text-gray-400 font-bold uppercase tracking-widest border-b pb-1 mb-4">Operations & Tasks</h4>
                        <div class="space-y-3">
                            <div class="flex items-center gap-3 p-3 bg-gray-50 dark:bg-gray-800 rounded-lg">
                                <div class="w-5 h-5 border-2 border-primary rounded flex items-center justify-center">
                                    <div class="w-3 h-3 bg-primary rounded-sm"></div>
                                </div>
                                <span class="font-bold">${job.serviceType}</span>
                            </div>
                            <div class="p-3 border-2 border-dashed border-gray-100 dark:border-gray-800 rounded-lg min-h-[100px]">
                                <p class="text-xs text-gray-400 mb-2 uppercase font-bold">Advisor Notes</p>
                                <p class="text-sm text-gray-600 dark:text-gray-400">${job.notes || 'No special instructions.'}</p>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-6 pt-10 border-t border-gray-100 dark:border-gray-800 text-center">
                        <div class="space-y-1">
                            <div class="h-0.5 bg-gray-200 dark:bg-gray-700 w-full mb-6"></div>
                            <p class="text-[10px] font-bold uppercase tracking-widest">Customer Signature</p>
                        </div>
                        <div class="space-y-1">
                            <div class="h-0.5 bg-gray-200 dark:bg-gray-700 w-full mb-6"></div>
                            <p class="text-[10px] font-bold uppercase tracking-widest">Advisor Signature</p>
                        </div>
                        <div class="space-y-1">
                            <div class="h-0.5 bg-gray-200 dark:bg-gray-700 w-full mb-6"></div>
                            <p class="text-[10px] font-bold uppercase tracking-widest">QC Inspection Date</p>
                        </div>
                    </div>
                `;
                document.getElementById('detail-modal').classList.remove('hidden');
            };

            window.generateInvoice = (id) => {
                const job = App.db.getData('jobcards').find(j => j.id === id);
                localStorage.setItem('pending_invoice_job_id', id);
                window.location.href = 'billing.html';
            };

            window.searchHistory = () => {
                const reg = document.getElementById('search-history').value.trim().toUpperCase();
                const container = document.getElementById('history-results');
                if (!reg) return;

                const allJobs = App.db.getData('jobcards').filter(j => j.vehicleReg.toUpperCase() === reg);
                container.innerHTML = '';
                
                if (allJobs.length === 0) {
                    container.innerHTML = '<p class="text-center py-10 text-gray-400 text-sm">No service history found for this registration number.</p>';
                } else {
                    allJobs.forEach(j => {
                        const div = document.createElement('div');
                        div.className = 'p-4 border dark:border-gray-800 rounded-xl bg-gray-50 dark:bg-gray-800/30';
                        div.innerHTML = `
                            <div class="flex justify-between mb-2">
                                <span class="text-xs font-bold text-accent">#${j.jobNo}</span>
                                <span class="text-xs text-gray-400">${new Date(j.createdAt).toLocaleDateString()}</span>
                            </div>
                            <h4 class="font-bold">${j.serviceType}</h4>
                            <p class="text-sm text-gray-500">Mechanic: ${j.mechanic}</p>
                            ${j.notes ? `<p class="text-xs mt-2 text-gray-400 italic">"${j.notes}"</p>` : ''}
                        `;
                        container.appendChild(div);
                    });
                }
            };

            // Event Listeners
            document.getElementById('btn-service-history').addEventListener('click', () => {
                document.getElementById('history-modal').classList.remove('hidden');
            });
            document.querySelectorAll('.close-modal').forEach(b => b.addEventListener('click', () => {
                document.getElementById('history-modal').classList.add('hidden');
            }));
            document.querySelector('.close-detail').addEventListener('click', () => {
                document.getElementById('detail-modal').classList.add('hidden');
            });

            renderJobCards();
        });
    </script>
</body>
</html>
