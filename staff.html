<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff | AutoServe Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body class="light">
    <main class="main-content">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Staff Management</h1>
                <p class="text-gray-500 dark:text-gray-400">Manage mechanics, advisors, and workshop personnel.</p>
            </div>
            <button id="btn-add-staff" class="bg-accent hover:bg-accent-hover text-white px-5 py-2.5 rounded-lg text-sm font-semibold flex items-center gap-2 shadow-md shadow-accent/20 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                Add Staff Member
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="staff-grid">
            <!-- Staff cards -->
        </div>

        <div id="empty-staff" class="hidden p-20 text-center card rounded-xl">
             <p class="text-gray-500">No staff members registered. Start by adding your team!</p>
        </div>

        <!-- Staff Modal -->
        <div id="staff-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
             <div class="bg-white dark:bg-gray-900 rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden">
                <div class="p-6 border-b dark:border-gray-800 flex items-center justify-between">
                    <h2 id="modal-title" class="text-xl font-bold">Staff Details</h2>
                    <button class="close-modal text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
                </div>
                <form id="staff-form" class="p-6 space-y-4">
                    <input type="hidden" id="edit-staff-id">
                    <div>
                        <label class="block text-sm font-medium mb-1">Full Name *</label>
                        <input id="staff-name" type="text" required class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Role *</label>
                            <select id="staff-role" required class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800">
                                <option value="Mechanic">Mechanic</option>
                                <option value="Service Advisor">Service Advisor</option>
                                <option value="Receptionist">Receptionist</option>
                                <option value="Manager">Manager</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Specialization</label>
                            <select id="staff-spec" class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800">
                                <option value="Both">Both Cars & Bikes</option>
                                <option value="Cars">Only Cars</option>
                                <option value="Bikes">Only Bikes</option>
                                <option value="General">General/Admin</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Phone *</label>
                            <input id="staff-phone" type="tel" required class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Status</label>
                            <select id="staff-status" class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800">
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Email</label>
                        <input id="staff-email" type="email" class="w-full p-2 border dark:border-gray-700 rounded-lg dark:bg-gray-800">
                    </div>
                    <div class="mt-6 flex justify-end gap-3">
                        <button type="button" class="close-modal px-6 py-2 border dark:border-gray-700 rounded-lg">Cancel</button>
                        <button type="submit" class="bg-primary text-white px-8 py-2 rounded-lg font-bold">Save Staff Member</button>
                    </div>
                </form>
             </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('staff-grid');
            const emptyStaff = document.getElementById('empty-staff');
            const modal = document.getElementById('staff-modal');
            const form = document.getElementById('staff-form');

            function renderStaff() {
                const staff = App.db.getData('staff');
                grid.innerHTML = '';

                if (staff.length === 0) {
                    emptyStaff.classList.remove('hidden');
                } else {
                    emptyStaff.classList.add('hidden');
                    staff.forEach(s => {
                        const card = document.createElement('div');
                        card.className = 'card p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex flex-col items-center text-center';
                        card.innerHTML = `
                            <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=random" class="w-20 h-20 rounded-full mb-4 border-4 border-gray-50 dark:border-gray-800">
                            <h3 class="text-lg font-bold">${s.name}</h3>
                            <p class="text-xs text-accent font-bold uppercase tracking-widest mb-4">${s.role}</p>
                            
                            <div class="w-full space-y-2 mb-6">
                                <div class="flex justify-between text-sm">
                                    <span class="text-gray-400">Spec:</span>
                                    <span class="font-medium">${s.specialization}</span>
                                </div>
                                <div class="flex justify-between text-sm">
                                    <span class="text-gray-400">Phone:</span>
                                    <span class="font-medium">${s.phone}</span>
                                </div>
                                <div class="flex justify-between text-sm">
                                    <span class="text-gray-400">Status:</span>
                                    <span class="${s.status === 'Active' ? 'text-green-500' : 'text-red-500'} font-bold">${s.status}</span>
                                </div>
                            </div>

                            <div class="flex gap-2 w-full pt-4 border-t dark:border-gray-800 mt-auto">
                                <button onclick="editStaff('${s.id}')" class="flex-1 py-1 px-3 border dark:border-gray-700 rounded-lg text-xs font-bold hover:bg-gray-50 dark:hover:bg-gray-800">Edit</button>
                                <button onclick="markAttendance('${s.id}')" class="flex-1 py-1 px-3 bg-primary text-white rounded-lg text-xs font-bold">Mark Presence</button>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            }

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                if (!App.ui.validateForm('staff-form')) return;

                const id = document.getElementById('edit-staff-id').value;
                const data = {
                    name: document.getElementById('staff-name').value,
                    role: document.getElementById('staff-role').value,
                    specialization: document.getElementById('staff-spec').value,
                    phone: document.getElementById('staff-phone').value,
                    status: document.getElementById('staff-status').value,
                    email: document.getElementById('staff-email').value,
                };

                if (id) {
                    App.db.update('staff', id, data);
                    App.ui.showToast('Staff profile updated');
                } else {
                    App.db.create('staff', data);
                    App.ui.showToast('New staff member added', 'success');
                }

                modal.classList.add('hidden');
                renderStaff();
            });

            window.editStaff = (id) => {
                const s = App.db.getData('staff').find(x => x.id === id);
                if (s) {
                    document.getElementById('edit-staff-id').value = s.id;
                    document.getElementById('staff-name').value = s.name;
                    document.getElementById('staff-role').value = s.role;
                    document.getElementById('staff-spec').value = s.specialization;
                    document.getElementById('staff-phone').value = s.phone;
                    document.getElementById('staff-status').value = s.status;
                    document.getElementById('staff-email').value = s.email || '';
                    modal.classList.remove('hidden');
                }
            };

            window.markAttendance = (id) => {
                const attendance = App.db.getData('attendance');
                const today = new Date().toISOString().split('T')[0];
                const alreadyMarked = attendance.find(a => a.staffId === id && a.date === today);

                if (alreadyMarked) {
                    App.ui.showToast('Attendance already marked for today', 'warning');
                } else {
                    App.db.create('attendance', { staffId: id, date: today, status: 'Present' });
                    App.ui.showToast('Attendance recorded', 'success');
                }
            };

            document.getElementById('btn-add-staff').addEventListener('click', () => {
                document.getElementById('edit-staff-id').value = '';
                form.reset();
                modal.classList.remove('hidden');
            });
            document.querySelectorAll('.close-modal').forEach(b => b.addEventListener('click', () => modal.classList.add('hidden')));

            renderStaff();
        });
    </script>
</body>
</html>
